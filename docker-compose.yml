version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: pentagi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pentagi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pentagi}
      POSTGRES_DB: ${POSTGRES_DB:-pentagi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pentagi} -d ${POSTGRES_DB:-pentagi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pentagi-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: pentagi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-pentagi}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-pentagi}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pentagi-network

  # Main pentagi backend service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: pentagi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-pentagi}:${POSTGRES_PASSWORD:-pentagi}@postgres:5432/${POSTGRES_DB:-pentagi}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD:-pentagi}@redis:6379/0
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - pentagi-network

  # Frontend service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: pentagi-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - pentagi-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pentagi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
